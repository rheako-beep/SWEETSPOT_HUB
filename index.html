<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAGE X 운영 허브</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      background: #dde1e7;
      background-image:
        radial-gradient(ellipse at 8% 8%, rgba(255,255,255,0.75) 0%, transparent 45%),
        radial-gradient(ellipse at 92% 90%, rgba(180,190,210,0.45) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 15%, rgba(190,220,255,0.25) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(210,195,255,0.20) 0%, transparent 40%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .panel {
      width: 100%;
      max-width: 820px;
      background: rgba(230,234,240,0.60);
      backdrop-filter: blur(48px) saturate(160%);
      -webkit-backdrop-filter: blur(48px) saturate(160%);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.70);
      padding: 32px 28px 36px;
      box-shadow:
        10px 10px 28px rgba(163,177,198,0.60),
        -8px -8px 24px rgba(255,255,255,0.80),
        inset 0 1px 0 rgba(255,255,255,0.75),
        inset 0 -1px 0 rgba(163,177,198,0.15);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60%; height: 45%;
      background: radial-gradient(ellipse at 15% 15%, rgba(255,255,255,0.35) 0%, transparent 65%);
      pointer-events: none;
      border-radius: 32px 0 0 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
      position: relative;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
      color: #3a4050;
      letter-spacing: -0.4px;
    }

    .header-icons { display: flex; gap: 10px; }

    .h-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(235,238,244,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.80);
      box-shadow: 3px 3px 8px rgba(163,177,198,0.50), -3px -3px 8px rgba(255,255,255,0.75);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #6b7488; cursor: default;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 600px) { .grid { grid-template-columns: repeat(2,1fr); } }

    .card {
      border-radius: 22px;
      padding: 22px 18px 20px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 13px;
      backdrop-filter: blur(24px) saturate(150%);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.68);
      box-shadow:
        7px 7px 18px rgba(163,177,198,0.55),
        -6px -6px 16px rgba(255,255,255,0.78),
        inset 0 1px 0 rgba(255,255,255,0.80),
        inset 0 -1px 0 rgba(163,177,198,0.12);
      transition: transform 0.22s cubic-bezier(.34,1.4,.64,1), box-shadow 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 70%; height: 50%;
      background: radial-gradient(ellipse at 20% 20%, rgba(255,255,255,0.50) 0%, transparent 65%);
      pointer-events: none;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 12%; right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
    }

    .card:nth-child(1) { background: rgba(190,210,255,0.28); }
    .card:nth-child(2) { background: rgba(180,240,210,0.25); }
    .card:nth-child(3) { background: rgba(200,225,255,0.25); }
    .card:nth-child(4) { background: rgba(255,215,180,0.25); }
    .card:nth-child(5) { background: rgba(230,200,255,0.25); }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow:
        12px 12px 28px rgba(163,177,198,0.62),
        -10px -10px 24px rgba(255,255,255,0.85),
        inset 0 1px 0 rgba(255,255,255,0.85);
    }

    .card:active {
      transform: scale(0.98);
      box-shadow:
        3px 3px 10px rgba(163,177,198,0.50),
        -3px -3px 10px rgba(255,255,255,0.70),
        inset 4px 4px 10px rgba(163,177,198,0.25),
        inset -4px -4px 10px rgba(255,255,255,0.55);
    }

    .icon-wrap {
      width: 46px; height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.80);
      box-shadow: 4px 4px 10px rgba(163,177,198,0.45), -4px -4px 10px rgba(255,255,255,0.80), inset 0 1px 0 rgba(255,255,255,0.90);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .card:nth-child(1) .icon-wrap { background: rgba(190,210,255,0.45); }
    .card:nth-child(2) .icon-wrap { background: rgba(170,240,205,0.45); }
    .card:nth-child(3) .icon-wrap { background: rgba(190,220,255,0.45); }
    .card:nth-child(4) .icon-wrap { background: rgba(255,210,170,0.45); }
    .card:nth-child(5) .icon-wrap { background: rgba(225,195,255,0.45); }

    .card-title { font-size: 15px; font-weight: 700; color: #3a4055; letter-spacing: -0.3px; }
    .card-desc  { font-size: 12px; color: #7a8299; line-height: 1.6; }

    .open-tag {
      align-self: flex-start;
      margin-top: 2px;
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 11.5px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: 3px 3px 8px rgba(163,177,198,0.45), -3px -3px 8px rgba(255,255,255,0.78), inset 0 1px 0 rgba(255,255,255,0.80);
      display: flex; align-items: center; gap: 4px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:nth-child(1) .open-tag { background: rgba(190,210,255,0.40); color: #5070b8; }
    .card:nth-child(2) .open-tag { background: rgba(160,235,200,0.40); color: #3a8060; }
    .card:nth-child(3) .open-tag { background: rgba(185,215,255,0.40); color: #4868a8; }
    .card:nth-child(4) .open-tag { background: rgba(255,205,165,0.40); color: #a06030; }
    .card:nth-child(5) .open-tag { background: rgba(220,190,255,0.40); color: #7040a0; }

    .card:hover .open-tag {
      transform: scale(1.05);
      box-shadow: 5px 5px 12px rgba(163,177,198,0.52), -5px -5px 12px rgba(255,255,255,0.85);
    }
  </style>
</head>
<body>
